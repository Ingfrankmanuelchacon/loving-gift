<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Grimm Troupe - Para Gipsy</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  </head>
  <body>
    <audio id="bg-music" src="audio/hersong.mp3" loop></audio>

    <div id="intro-screen">
      <div class="intro-box" onclick="startMagic()">
        <img
          src="images/grimm/grimm.webp"
          alt="Grimm Master"
          class="grimm-icon"
        />
        <h1 class="troupe-title">The Grimm Troupe</h1>
        <p class="subtitle">Para: Gipsy</p>
        <p class="pulse-text">Tocar para encender la llama</p>
      </div>
    </div>

    <div id="main-stage"></div>

    <div id="finale-screen" class="hidden">
      <div class="finale-content">
        <div class="couple-container">
          <img
            src="images/me/frank.webp"
            class="photo frank-photo"
            alt="Frank"
          />
          <span class="ampersand">&</span>
          <img
            src="images/her/pic-1.webp"
            class="photo gipsy-photo"
            alt="Gipsy"
          />
        </div>
        <p class="finale-text">
          "La llama arde brillante para usted, Ingeniera."
        </p>
        <p class="footer-text">Developed by Frank Manuel • 2026</p>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
